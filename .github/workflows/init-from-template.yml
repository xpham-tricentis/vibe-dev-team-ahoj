name: Initialize from template

on:
  push:
    branches: [main]

jobs:
  init:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize README
        run: |
          if [ "$(git rev-list --count HEAD)" != "1" ]; then
            exit 0
          fi
          echo "# ${{ github.event.repository.name }}" > README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Initialize repository from template"
          git push
