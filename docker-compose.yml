# Dev container orchestration for the AI Pipeline.
#
# Quick start:
#   docker compose up -d                          # Start the container in the background
#   docker compose exec dev bash                  # Open a shell inside it
#   npm create vite@latest my-app -- --template react-ts
#   cd my-app && npm install && npm run dev       # Vite dev server at http://localhost:5173

services:
  dev:
    build: .
    image: claude-team-agent-dev:latest
    container_name: claude-team-agent-dev

    # Mount the project root into /workspace so files created inside the
    # container show up on the host (and vice versa). The named volume on
    # node_modules avoids your host's node_modules clobbering the container's
    # — important when host OS differs from the container's Linux.
    volumes:
      - .:/workspace
      - dev_node_modules:/workspace/node_modules

    # 5173 = Vite dev server (UI), 8000 = FastAPI/uvicorn default (backend).
    # Add 6006 if you bring in Storybook, or others as needed.
    ports:
      - "5173:5173"
      - "8000:8000"

    working_dir: /workspace

    # Keep stdin/tty open so `docker compose exec dev bash` is interactive.
    stdin_open: true
    tty: true

    # Hold the container open. The Dockerfile's CMD does the same; this is
    # redundant but explicit for anyone reading just the compose file.
    command: bash -c "tail -f /dev/null"

volumes:
  dev_node_modules:
